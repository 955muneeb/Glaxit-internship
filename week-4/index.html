<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & Quote Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; background-color: #f4f4f9; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { padding-left: 1.5rem; }
    </style>
</head>
<body>

    <h1>Daily Dashboard</h1>

    <div class="card" id="weather-card">
        <h3>🌤️ Weather Overview (Taxila)</h3>
        <div id="weather-display">Loading weather data...</div>
    </div>

    <div class="card" id="quote-card">
        <h3>💡 Quote of the Day</h3>
        <div id="quote-display" style="font-size: 1.2rem; font-style: italic; margin-bottom: 1rem;">Loading quote...</div>
        <button id="save-quote-btn">Save to Favorites</button>
    </div>

    <div class="card" id="favorites-card">
        <h3>⭐ Favorite Quotes</h3>
        <ul id="saved-quotes-list"></ul>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
