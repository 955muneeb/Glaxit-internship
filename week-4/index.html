<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & Quote Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <h1>Daily Dashboard</h1>

        <div class="card" id="weather-card">
            <h3>🌤️ Local Weather</h3>
            <form id="search-form" class="search-group">
                <input type="text" id="search-input" placeholder="Search city (e.g., Taxila, London)..." required />
                <button type="submit" id="search-btn">Search</button>
            </form>
            <div id="weather-display">Loading weather data...</div>
        </div>

        <div class="card" id="quote-card">
            <h3>💡 Quote of the Day</h3>
            <div id="quote-display">Loading quote...</div>
            <button id="save-quote-btn">Save to Favorites</button>
        </div>

        <div class="card" id="favorites-card">
            <h3>⭐ Favorite Quotes</h3>
            <ul id="saved-quotes-list"></ul>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
