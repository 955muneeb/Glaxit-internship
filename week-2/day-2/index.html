<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Management Intake Form</title>
    <link rel="stylesheet" href="ui.css">
</head>
<body>

    <div class="form-wrapper">
        <header>
            <h2>Intake Form</h2>
            <p>Please enter  details below.</p>
        </header>

        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="fullName">Full Name <span class="required" aria-hidden="true">*</span></label>
                <input type="text" id="fullName" name="fullName" placeholder="e.g., Muneeb Ur Rehman" required aria-required="true">
            </div>

            <div class="form-group">
                <label for="email">Business Email <span class="required" aria-hidden="true">*</span></label>
                <input type="email" id="email" name="email" placeholder="muneebrh@example.com" required aria-required="true" aria-describedby="emailHint">
                <span id="emailHint" class="hint-text">We will use this for official correspondence.</span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="03XXXXXXXXX" pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label for="service">Service Requested</label>
                <select id="service" name="service">
                    <option value="web">Web Development</option>
                    <option value="app">Mobile App Development</option>
                    <option value="seo">SEO & Marketing</option>
                    <option value="uiux">UI/UX Designing</option>

                </select>
            </div>

            <button type="submit" class="submit-btn">Register</button>

        </form>
    </div>

</body>
</html>
